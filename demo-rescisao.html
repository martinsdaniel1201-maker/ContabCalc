<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ContabCalc AI — Demo Rescisão</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #0b0d12; --card: #12151c; --border: #232734; --text: #e8eaed;
    --muted: #8a8f9c; --accent: #6366f1; --green: #22c55e; --red: #ef4444;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  label { display:block; font-size: 13px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  input, select { width: 100%; padding: 10px 12px; background: #1a1d26; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .row { display:flex; gap: 12px; }
  .row > div { flex: 1; }
  button { width: 100%; margin-top: 22px; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:hover { opacity: 0.9; }
  .checkbox-row { display:flex; align-items:center; gap:8px; margin-top: 14px; }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; color: var(--text); }

  .resultado { display:none; }
  .valor-final { text-align:center; padding: 24px 0 8px; }
  .valor-final .label { color: var(--muted); font-size: 13px; }
  .valor-final .valor { font-size: 36px; font-weight: 700; color: var(--green); }
  .item { border-bottom: 1px solid var(--border); padding: 12px 0; }
  .item:last-child { border-bottom: none; }
  .item-top { display:flex; justify-content:space-between; font-size: 14px; font-weight: 600; }
  .item-top .valor.negativo { color: var(--red); }
  .item-top .valor.positivo { color: var(--green); }
  .item-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .item-explicacao { font-size: 13px; color: #c3c6ce; margin-top: 6px; line-height: 1.5; }
  .item-base-legal { display:inline-block; margin-top: 6px; font-size: 11px; background: rgba(99,102,241,0.15); color: #a5b4fc; padding: 3px 8px; border-radius: 6px; }
  .alerta { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 20px 0 6px; }
  .footer-note { text-align:center; font-size: 12px; color: var(--muted); margin-top: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ContabCalc AI</h1>
  <div class="sub">Demo — Rescisão sem justa causa (motor de cálculo 2026, client-side)</div>

  <div class="card">
    <label>Salário Bruto (R$)</label>
    <input type="number" id="salario" value="3500" step="0.01">

    <div class="row">
      <div>
        <label>Data de Admissão</label>
        <input type="date" id="admissao" value="2023-03-10">
      </div>
      <div>
        <label>Data de Desligamento</label>
        <input type="date" id="desligamento" value="2026-07-10">
      </div>
    </div>

    <label>Dependentes (IRRF)</label>
    <input type="number" id="dependentes" value="0" min="0">

    <div class="checkbox-row">
      <input type="checkbox" id="feriasVencidas">
      <label for="feriasVencidas">Possui férias vencidas (12+ meses sem gozar)</label>
    </div>

    <button onclick="calcular()">Calcular Rescisão</button>
  </div>

  <div class="alerta" id="alertaBox" style="display:none;"></div>

  <div class="card resultado" id="resultadoBox">
    <div class="valor-final">
      <div class="label">Valor líquido estimado a receber</div>
      <div class="valor" id="valorFinal">R$ 0,00</div>
    </div>

    <div class="section-title">Proventos</div>
    <div id="itensBox"></div>

    <div class="section-title">Descontos</div>
    <div id="descontosBox"></div>

    <div class="footer-note">Cálculo estimado, não substitui orientação de contador ou advogado trabalhista.</div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Motor de cálculo — porta em JS puro (browser) dos módulos TypeScript de
// /lib/engine, para teste imediato sem build. Mantém a mesma lógica e as
// mesmas tabelas de legislação 2026.
// ---------------------------------------------------------------------------

const TABELA_INSS_2026 = {
  faixas: [
    { ate: 1621.00, aliquota: 0.075, deducao: 0 },
    { ate: 2902.84, aliquota: 0.09, deducao: 24.32 },
    { ate: 4354.27, aliquota: 0.12, deducao: 111.40 },
    { ate: Infinity, aliquota: 0.14, deducao: 198.49 },
  ],
};
const TETO_INSS_2026 = 8475.55;

const TABELA_IRRF_2026 = {
  faixas: [
    { ate: 2428.80, aliquota: 0, deducao: 0 },
    { ate: 2826.65, aliquota: 0.075, deducao: 182.16 },
    { ate: 3751.05, aliquota: 0.15, deducao: 394.16 },
    { ate: 4664.68, aliquota: 0.225, deducao: 675.49 },
    { ate: Infinity, aliquota: 0.275, deducao: 908.73 },
  ],
  deducaoPorDependente: 189.59,
  descontoSimplificadoMaximo: 607.20,
};
const REDUTOR_IRRF_2026 = {
  isencaoTotalAte: 5000.00,
  faixaTransicaoAte: 7350.00,
  formula: (renda) => 978.62 - 0.133145 * renda,
};
const FGTS_2026 = { aliquotaDeposito: 0.08, multaSemJustaCausa: 0.40 };

function calcularInss(remuneracao) {
  const base = Math.min(remuneracao, TETO_INSS_2026);
  const faixa = TABELA_INSS_2026.faixas.find(f => base <= f.ate);
  const valor = Math.max(0, base * faixa.aliquota - faixa.deducao);
  return {
    codigo: "inss", descricao: "Desconto de INSS", valor: -round2(valor),
    formula: `min(remuneração, teto R$${TETO_INSS_2026.toFixed(2)}) × ${(faixa.aliquota*100).toFixed(1)}% − R$${faixa.deducao.toFixed(2)}`,
    baseLegal: "Lei 8.212/1991 e Portaria Interministerial MPS/MF vigente",
    explicacao: "O INSS é progressivo: cada faixa salarial paga uma alíquota diferente (7,5% a 14%). A fórmula com 'parcela a deduzir' chega ao mesmo resultado do cálculo faixa a faixa."
  };
}

function calcularIrrf(rendaBrutaMensal, inssDoMes, dependentes) {
  const deducaoDependentes = dependentes * TABELA_IRRF_2026.deducaoPorDependente;
  const deducoesLegais = inssDoMes + deducaoDependentes;
  const usarSimplificado = TABELA_IRRF_2026.descontoSimplificadoMaximo > deducoesLegais;
  const deducaoAplicada = usarSimplificado ? TABELA_IRRF_2026.descontoSimplificadoMaximo : deducoesLegais;
  const base = Math.max(0, rendaBrutaMensal - deducaoAplicada);
  const faixa = TABELA_IRRF_2026.faixas.find(f => base <= f.ate);
  const irrfTabela = Math.max(0, base * faixa.aliquota - faixa.deducao);

  let redutor = 0;
  let explicacaoRedutor;
  if (rendaBrutaMensal <= REDUTOR_IRRF_2026.isencaoTotalAte) {
    redutor = irrfTabela;
    explicacaoRedutor = "Como a renda bruta mensal é de até R$5.000,00, o IRRF é totalmente zerado pelo redutor da Lei 15.270/2025.";
  } else if (rendaBrutaMensal <= REDUTOR_IRRF_2026.faixaTransicaoAte) {
    redutor = Math.max(0, REDUTOR_IRRF_2026.formula(rendaBrutaMensal));
    explicacaoRedutor = "Como a renda bruta mensal está entre R$5.000,01 e R$7.350,00, o IRRF é reduzido parcialmente pelo redutor da Lei 15.270/2025.";
  } else {
    explicacaoRedutor = "Como a renda bruta mensal ultrapassa R$7.350,00, não há redução — o imposto segue a tabela progressiva tradicional.";
  }
  redutor = Math.min(redutor, irrfTabela);
  const irrfFinal = round2(irrfTabela - redutor);

  return {
    codigo: "irrf", descricao: "Desconto de IRRF", valor: -irrfFinal,
    formula: `Base = renda bruta − ${usarSimplificado ? "desc. simplificado R$607,20" : "(INSS + dependentes)"}; IRRF = base × ${(faixa.aliquota*100).toFixed(1)}% − R$${faixa.deducao.toFixed(2)} − redutor`,
    baseLegal: "Lei 9.250/1995 (tabela) e Lei 15.270/2025 (redutor)",
    explicacao: "O IRRF é calculado em duas etapas: tabela progressiva tradicional e, desde jan/2026, o redutor da Lei 15.270/2025. " + explicacaoRedutor
  };
}

function contarMesesProporcionais(dataInicioStr, dataFimStr) {
  const inicio = new Date(dataInicioStr), fim = new Date(dataFimStr);
  let meses = (fim.getFullYear() - inicio.getFullYear()) * 12 + (fim.getMonth() - inicio.getMonth());
  const diaFim = fim.getDate(), diaInicio = inicio.getDate();
  if (diaFim - diaInicio >= 15 || (diaFim >= 15 && diaInicio > diaFim)) meses += 1;
  return Math.max(0, Math.min(12, meses));
}

function contarAnosCompletos(dataInicioStr, dataFimStr) {
  const inicio = new Date(dataInicioStr), fim = new Date(dataFimStr);
  let anos = fim.getFullYear() - inicio.getFullYear();
  const aindaNao = fim.getMonth() < inicio.getMonth() || (fim.getMonth() === inicio.getMonth() && fim.getDate() < inicio.getDate());
  if (aindaNao) anos -= 1;
  return Math.max(0, anos);
}

function calcularDiasAvisoPrevio(dataInicioStr, dataFimStr) {
  const anos = contarAnosCompletos(dataInicioStr, dataFimStr);
  return Math.min(90, 30 + anos * 3);
}

function calcularFerias(salarioBruto, mesesProporcionais, temFeriasVencidas) {
  const itens = [];
  if (temFeriasVencidas) {
    const valor = salarioBruto, terco = valor / 3;
    itens.push({ codigo: "ferias_vencidas", descricao: "Férias Vencidas", valor: round2(valor),
      formula: "1 salário bruto integral (período aquisitivo já vencido)",
      baseLegal: "Art. 7º, XVII da CF e Art. 130 da CLT",
      explicacao: "Quando o funcionário completa 12 meses sem gozar férias, esse período 'vence' e deve ser pago." });
    itens.push({ codigo: "terco_ferias_vencidas", descricao: "Terço Constitucional (Férias Vencidas)", valor: round2(terco),
      formula: "valor das férias vencidas ÷ 3", baseLegal: "Art. 7º, XVII da CF",
      explicacao: "Adicional de 1/3 sobre o valor das férias, garantido pela Constituição." });
  }
  if (mesesProporcionais > 0) {
    const valor = (salarioBruto / 12) * mesesProporcionais, terco = valor / 3;
    itens.push({ codigo: "ferias_proporcionais", descricao: "Férias Proporcionais", valor: round2(valor),
      formula: `(salário ÷ 12) × ${mesesProporcionais} meses`, baseLegal: "Art. 146, parágrafo único da CLT",
      explicacao: "Refere-se ao período atual, ainda não completou 12 meses. Cada mês com 15+ dias gera 1/12 avos." });
    itens.push({ codigo: "terco_ferias_proporcionais", descricao: "Terço Constitucional (Férias Proporcionais)", valor: round2(terco),
      formula: "valor das férias proporcionais ÷ 3", baseLegal: "Art. 7º, XVII da CF",
      explicacao: "Mesmo adicional de 1/3 aplicado sobre as férias proporcionais." });
  }
  return itens;
}

function calcularDecimoTerceiro(salarioBruto, mesesTrabalhadosNoAno) {
  const valor = (salarioBruto / 12) * mesesTrabalhadosNoAno;
  return [{
    codigo: "decimo_terceiro_proporcional",
    descricao: mesesTrabalhadosNoAno >= 12 ? "13º Salário Integral" : "13º Salário Proporcional",
    valor: round2(valor), formula: `(salário ÷ 12) × ${mesesTrabalhadosNoAno} meses`,
    baseLegal: "Lei 4.090/1962 e Lei 4.749/1965",
    explicacao: "1/12 do salário para cada mês trabalhado com 15+ dias no ano."
  }];
}

function round2(v) { return Math.round(v * 100) / 100; }
function fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

function calcular() {
  const salarioBruto = parseFloat(document.getElementById('salario').value);
  const dataAdmissao = document.getElementById('admissao').value;
  const dataDesligamento = document.getElementById('desligamento').value;
  const dependentesIR = parseInt(document.getElementById('dependentes').value) || 0;
  const feriasVencidas = document.getElementById('feriasVencidas').checked;

  const alertaBox = document.getElementById('alertaBox');
  alertaBox.style.display = 'none';
  if (new Date(dataDesligamento) < new Date(dataAdmissao)) {
    alertaBox.style.display = 'block';
    alertaBox.textContent = 'A data de desligamento não pode ser anterior à data de admissão.';
    return;
  }
  if (!(salarioBruto > 0)) {
    alertaBox.style.display = 'block';
    alertaBox.textContent = 'Informe um salário bruto maior que zero.';
    return;
  }

  const itens = [];
  const dataFim = new Date(dataDesligamento);
  const diasTrabalhadosNoMes = dataFim.getDate();
  const valorSaldoSalario = (salarioBruto / 30) * diasTrabalhadosNoMes;
  itens.push({ codigo: "saldo_salario", descricao: "Saldo de Salário", valor: round2(valorSaldoSalario),
    formula: `(salário ÷ 30) × ${diasTrabalhadosNoMes} dias trabalhados no mês`, baseLegal: "Art. 459 da CLT",
    explicacao: "Dias efetivamente trabalhados no mês da rescisão, ainda não pagos." });

  const diasAviso = calcularDiasAvisoPrevio(dataAdmissao, dataDesligamento);
  const valorAviso = (salarioBruto / 30) * diasAviso;
  itens.push({ codigo: "aviso_previo_indenizado", descricao: "Aviso Prévio Indenizado", valor: round2(valorAviso),
    formula: `(salário ÷ 30) × ${diasAviso} dias (30 + 3 por ano completo, máx. 90)`, baseLegal: "Lei 12.506/2011",
    explicacao: "Pago em dinheiro pois a empresa dispensou sem exigir cumprimento. Mínimo 30 dias + 3 por ano de casa, até 90." });

  const mesesFerias = contarMesesProporcionais(dataAdmissao, dataDesligamento);
  itens.push(...calcularFerias(salarioBruto, mesesFerias, feriasVencidas));

  const mesesDecimo = contarMesesProporcionais(`${dataFim.getFullYear()}-01-01`, dataDesligamento);
  const itens13 = calcularDecimoTerceiro(salarioBruto, mesesDecimo);
  itens.push(...itens13);

  const depositoFgts = salarioBruto * FGTS_2026.aliquotaDeposito;
  itens.push({ codigo: "fgts_deposito_mes", descricao: "Depósito de FGTS do Mês", valor: round2(depositoFgts),
    formula: `salário × ${(FGTS_2026.aliquotaDeposito*100).toFixed(0)}%`, baseLegal: "Lei 8.036/1990",
    explicacao: "8% do salário depositado mensalmente pelo empregador em conta vinculada do FGTS." });

  const multaFgts = depositoFgts * FGTS_2026.multaSemJustaCausa;
  itens.push({ codigo: "multa_fgts_40", descricao: "Multa de 40% do FGTS", valor: round2(multaFgts),
    formula: `saldo do FGTS × ${(FGTS_2026.multaSemJustaCausa*100).toFixed(0)}%`, baseLegal: "Art. 18, §1º da Lei 8.036/1990",
    explicacao: "Na dispensa sem justa causa, o empregador paga multa de 40% sobre o saldo do FGTS do contrato." });

  const baseDescontos = valorSaldoSalario + itens13[0].valor;
  const inss = calcularInss(baseDescontos);
  const irrf = calcularIrrf(baseDescontos, Math.abs(inss.valor), dependentesIR);
  const descontos = [inss, irrf];

  const valorFinal = itens.reduce((s, i) => s + i.valor, 0) + descontos.reduce((s, d) => s + d.valor, 0);

  document.getElementById('valorFinal').textContent = fmt(valorFinal);
  document.getElementById('itensBox').innerHTML = itens.map(renderItem).join('');
  document.getElementById('descontosBox').innerHTML = descontos.map(renderItem).join('');
  document.getElementById('resultadoBox').style.display = 'block';
}

function renderItem(item) {
  const classe = item.valor < 0 ? 'negativo' : 'positivo';
  return `<div class="item">
    <div class="item-top"><span>${item.descricao}</span><span class="valor ${classe}">${fmt(item.valor)}</span></div>
    <div class="item-meta">${item.formula}</div>
    <div class="item-explicacao">${item.explicacao}</div>
    <span class="item-base-legal">${item.baseLegal}</span>
  </div>`;
}
</script>
</body>
</html>
